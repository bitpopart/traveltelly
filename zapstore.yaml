name: TravelTelly

summary: Travel the world. Share your story. Own your data.

description: |
  TravelTelly is an open-source decentralized travel platform built on the Nostr protocol.
  Your travels. Your photos. Your rules.

  Features:
  - GPS-tagged travel reviews with star ratings and photos
  - Long-form travel stories with rich media support
  - Trip reports with GPS route visualization and distance tracking
  - Stock media marketplace — sell travel photos with Lightning payments
  - Interactive world map with community pins
  - Fully decentralized — your data lives on Nostr relays
  - Lightning payments — zap posts and profiles via NIP-57

