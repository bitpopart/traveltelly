supported_nips:
  - "01"  # Basic protocol — events, filters, subscriptions
  - "07"  # Browser extension signing (window.nostr)
  - "23"  # Long-form content / articles (kind 30023)
  - "57"  # Lightning zaps (kind 9734/9735)
  - "99"  # Classified listings (kind 30402)
