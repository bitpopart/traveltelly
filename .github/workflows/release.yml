name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_HOME: /opt/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          printf 'y\ny\ny\ny\ny\ny\ny\n' | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/my-upload-key.jks
          keytool -importkeystore \
            -srckeystore android/app/my-upload-key.jks \
            -destkeystore android/app/my-upload-key.keystore \
            -deststoretype pkcs12 \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -deststorepass "$KEYSTORE_PASSWORD" \
            -srcalias upload \
            -destalias upload \
            -noprompt
          rm android/app/my-upload-key.jks
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=upload
          storeFile=my-upload-key.keystore
          EOF

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION_NAME="${TAG}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Copy 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build release APK and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
        env:
          ANDROID_SDK_ROOT: /opt/android-sdk
          ANDROID_HOME: /opt/android-sdk

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/TravelTelly.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "artifacts/TravelTelly.aab"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: artifacts/TravelTelly.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: artifacts/TravelTelly.aab
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-apk
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/TravelTelly.apk
            artifacts/TravelTelly.aab

  publish-zapstore:
    name: Publish to Zapstore
    runs-on: ubuntu-latest
    needs: build-apk
    env:
      SIGN_WITH: ${{ secrets.ZAPSTORE_BUNKER_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install zsp
        run: go install github.com/zapstore/zsp@latest

      - name: Configure bunker key
        env:
          ZAPSTORE_CLIENT_KEY: ${{ secrets.ZAPSTORE_CLIENT_KEY }}
          ZAPSTORE_BUNKER_URL: ${{ secrets.ZAPSTORE_BUNKER_URL }}
        run: |
          BUNKER_PUBKEY=$(echo "$ZAPSTORE_BUNKER_URL" | sed 's|bunker://||;s|?.*||')
          mkdir -p ~/.config/zsp/bunker-keys
          echo "$ZAPSTORE_CLIENT_KEY" > ~/.config/zsp/bunker-keys/${BUNKER_PUBKEY}.key

      - name: Inject version and release_source into zapstore.yaml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "2i release_source:\ ./artifacts/TravelTelly.apk" zapstore.yaml
          sed -i "2i version:\ ${VERSION}" zapstore.yaml

      - name: Publish to Zapstore
        run: zsp publish -y --skip-metadata --skip-preview --skip-certificate-linking zapstore.yaml
